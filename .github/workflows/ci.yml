name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run catalog:check
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: mathe-reise:ci
      - name: Validate Compose configuration
        run: docker compose -f deploy/compose.yaml config
      - name: Start hardened container
        run: >-
          docker run --rm -d --name mathe-reise-ci
          --read-only
          --tmpfs /tmp:rw,noexec,nosuid,size=16m
          --cap-drop ALL
          --security-opt no-new-privileges:true
          -p 127.0.0.1:8080:8080
          mathe-reise:ci
      - name: Verify container and HTTP contract
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..20}; do
            if [ "$(docker inspect --format='{{.State.Health.Status}}' mathe-reise-ci)" = "healthy" ]; then
              break
            fi
            sleep 1
          done
          test "$(docker inspect --format='{{.State.Health.Status}}' mathe-reise-ci)" = "healthy"
          test "$(docker inspect --format='{{.HostConfig.ReadonlyRootfs}}' mathe-reise-ci)" = "true"
          curl --fail --silent --show-error http://127.0.0.1:8080/ > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8080/manifest.webmanifest > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8080/sw.js > /dev/null
          curl --fail --silent --show-error http://127.0.0.1:8080/content/task-catalog.json > /dev/null
          curl --fail --silent --show-error --head http://127.0.0.1:8080/ \
            | grep --ignore-case 'X-Content-Type-Options: nosniff'
          curl --fail --silent --show-error --head http://127.0.0.1:8080/content/task-catalog.json \
            | grep --ignore-case 'Cache-Control: no-cache, must-revalidate'
      - name: Show container logs on failure
        if: failure()
        continue-on-error: true
        run: docker logs mathe-reise-ci
      - name: Stop test container
        if: always()
        continue-on-error: true
        run: docker rm --force mathe-reise-ci
